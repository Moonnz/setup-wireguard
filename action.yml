name: Set up WireGuard
description: Set up WireGuard connection

inputs:
  endpoint:
    description: Endpoint in the HOST:PORT format
    required: true
  endpoint_public_key:
    description: Public key of the endpoint
    required: true
  ips:
    description: Comma-separated list of IP addresses
    required: true
  allowed_ips:
    description: Comma-separated list of netmasks
    required: true
  private_key:
    description: Private key
    required: true
  preshared_key:
    description: Preshared key
    required: false
  keepalive:
    description: Useful for NAT traversal
    required: false
  dns:
    description: Comma-separated list of DNS servers
    required: false

runs:
  using: composite
  steps:
    - run: |
        set -o errexit -o pipefail -o nounset

        readonly endpoint='${{ inputs.endpoint }}'
        readonly endpoint_public_key='${{ inputs.endpoint_public_key }}'
        readonly ips='${{ inputs.ips }}'
        readonly allowed_ips='${{ inputs.allowed_ips }}'
        readonly private_key='${{ inputs.private_key }}'
        readonly preshared_key='${{ inputs.preshared_key }}'
        readonly keepalive='${{ inputs.keepalive }}'
        readonly dns='${{ inputs.dns }}'

        # Mask sensitive values in GitHub Actions logs
        echo "::add-mask::${private_key}"
        if [ -n "$preshared_key" ]; then
          echo "::add-mask::${preshared_key}"
        fi

        readonly minport=51000
        readonly maxport=51999

        ifname="wg$(openssl rand -hex 4)"
        readonly ifname
        port="$(shuf "--input-range=$minport-$maxport" --head-count=1)"
        readonly port

        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq --no-install-recommends wireguard-tools

        readonly conf_path="/etc/wireguard/${ifname}.conf"

        # Build the wg-quick configuration file
        conf="[Interface]
        ListenPort = ${port}
        PrivateKey = ${private_key}"

        # Word-splitting is intentional here (ips is required and comma-separated)
        for ip in ${ips//,/ }; do
          conf="${conf}
        Address = ${ip}"
        done

        if [ -n "$dns" ]; then
          conf="${conf}
        DNS = ${dns}"
        fi

        conf="${conf}

        [Peer]
        Endpoint = ${endpoint}
        PublicKey = ${endpoint_public_key}
        AllowedIPs = ${allowed_ips}"

        if [ -n "$preshared_key" ]; then
          conf="${conf}
        PresharedKey = ${preshared_key}"
        fi

        if [ -n "$keepalive" ]; then
          conf="${conf}
        PersistentKeepalive = ${keepalive}"
        fi

        # Strip leading whitespace from each line (inherited from YAML indentation)
        conf="$(echo "$conf" | sed 's/^[[:space:]]*//')"

        # Write config file with restricted permissions from the start
        sudo mkdir -p /etc/wireguard
        sudo install -m 0600 /dev/null "$conf_path"
        printf '%s\n' "$conf" | sudo tee "$conf_path" > /dev/null

        # Bring up the WireGuard interface
        sudo wg-quick up "$ifname"

        # Display connection info for debugging (public info only)
        sudo wg show "$ifname" latest-handshakes
        sudo wg show "$ifname" endpoints

        # Export interface name so callers can tear down if needed:
        #   sudo wg-quick down "$WG_INTERFACE"
        echo "WG_INTERFACE=$ifname" >> "$GITHUB_ENV"
      shell: bash

branding:
  icon: star
  color: green
